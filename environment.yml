name: cellstic

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Core Python
  - python=3.10
  - pip=24.0

  # Scientific stack
  - numpy=1.24.4
  - pandas=2.0.3
  - scipy=1.10.1
  - scikit-learn=1.3.2
  - matplotlib=3.8.0
  - pyyaml=6.0.1
  - h5py=3.9.0
  - tqdm=4.66.1

  # PyTorch + CUDA 11.8
  - pytorch=2.1.0
  - torchvision=0.16.0
  - torchaudio=2.1.0
  - pytorch-cuda=11.8

  # Jupyter (optional but recommended for notebooks)
  - jupyterlab=4.0.7
  - ipykernel=6.25.2

  # Pip-only / version-sensitive
  - pip:
      # Single-cell / spatial
      - anndata==0.9.2
      - scanpy==1.9.6
      - celltypist==1.4.0

      # Graphs
      - python-igraph==0.11.3
      - igraph==0.10.8
      - networkx==3.1
      - louvain==0.8.1

      # DGL GPU (for CUDA 11.8); adjust if you use a different CUDA
      - dgl==1.1.2+cu118

      # Embedding / LLM tools (optional; not required for core reproduction)
      - FlagEmbedding==1.2.10
      - openai==1.13.3

