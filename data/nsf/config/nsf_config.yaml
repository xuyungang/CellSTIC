model:
  dropout: 0.1
  ccc:
    encoder_dims: [110, 70]
    decoder_dims: [420, 220, 80]
  feat:
    encoder_dims:
      - [100, 85, 60]
      - [100, 85, 60]
      - [100, 85, 60]
    decoder_dims: 
      - [60, 100]
      - [60, 100]
      - [60, 100]
    output_dims: [180, 60]
  graph:
    cluster_top_k: 10
    cluster_size: 30
    knn_top_k: 40
    expression_percentile: 75
    n_spots: 10
  tree:
    hierarchy_method: "balanced"

train:
  ccc:
    epochs: 50
    learning_rate: 0.003
    weight_decay: 0.00
    edge_type_loss_weight: 0.5
    sampling_rate: 0.25
  feat:
    epochs: 600
    learning_rate: 0.002
    n_clusters: 5
    weight_decay: 0.00
    weight_modality: 0.4
    entropy_weight: 0.3
