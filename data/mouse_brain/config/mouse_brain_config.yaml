model:
  dropout: 0.1
  ccc:
    encoder_dims: [131, 100, 50]
    decoder_dims: [200, 50]
  feat:
    encoder_dims: 
      - [131, 100, 50]
      - [131, 100, 50]
      - [131, 100, 50]
      - [131, 100, 50]
      - [131, 100, 50]
    decoder_dims: 
      - [50, 131]
      - [50, 131]
      - [50, 131]
      - [50, 131]
      - [50, 131]
    output_dims: [250, 50]
  graph:
    cluster_top_k: 20
    cluster_size: 60
    knn_top_k: 20
    expression_percentile: 95
    n_spots: 4
  tree:
    hierarchy_method: "balanced"

train:
  ccc:
    epochs: 100
    learning_rate: 0.004
    weight_decay: 0.00
    edge_type_loss_weight: 1
    sampling_rate: 0.3
  feat:
    epochs: 2000
    learning_rate: 0.001
    n_clusters: 9
    weight_decay: 0.00
    weight_modality: 0.5
    entropy_weight: 0.8
