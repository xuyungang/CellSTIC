model:
  dropout: 0.1
  ccc:
    encoder_dims: [250, 150, 100]
    decoder_dims: [400, 200]
  feat:
    encoder_dims: 
      - [250, 200, 120]
      - [250, 200, 120]
    decoder_dims: 
      - [120, 250]
      - [120, 250]
    output_dims: [240, 100]
  graph:
    cluster_top_k: 20
    cluster_size: 60
    knn_top_k: 20
    expression_percentile: 75
    n_spots: 10
  tree:
    hierarchy_method: "balanced"

training:
  ccc:
    epochs: 300
    learning_rate: 0.004
    weight_decay: 0.00
    edge_type_loss_weight: 1
    sampling_rate: 0.3
  feat:
    epochs: 2000
    learning_rate: 0.001
    n_clusters: 7
    weight_decay: 0.00
    weight_modality: 0.5
    entropy_weight: 0.8
