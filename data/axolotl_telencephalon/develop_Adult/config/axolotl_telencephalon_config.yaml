model:
  dropout: 0.1
  ccc:
    encoder_dims: [500, 200]
    decoder_dims: [600, 200]
  feat:
    encoder_dims: 
      - [500, 200]
    decoder_dims: 
      - [200, 500]
    output_dims: [200, 100]
  graph:
    cluster_top_k: 10
    cluster_size: 30
    knn_top_k: 20
    expression_percentile: 95
    n_spots: 4
  tree:
    hierarchy_method: "balanced"

train:
  ccc:
    epochs: 200
    learning_rate: 0.004
    weight_decay: 0.00
    edge_type_loss_weight: 1
    sampling_rate: 0.3
  feat:
    epochs: 1000
    learning_rate: 0.003
    n_clusters: 10
    weight_decay: 0.00
    weight_modality: 0.4
    entropy_weight: 0.4
